{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mcp-oauth2-proxy.serviceAccountName" . }}
  namespace: {{ include "mcp-oauth2-proxy.namespace" . }}
  labels:
    {{- include "mcp-oauth2-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
